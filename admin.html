<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Panel | Vian Software Solutions</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script defer src="js/theme.js"></script>
  <script defer src="js/app.js"></script>
  <style>
    .admin-layout { display: flex; min-height: calc(100vh - var(--nav-height)); }
    .admin-sidebar { width: 240px; border-right: 1px solid var(--border); padding: 24px; flex-shrink: 0; }
    .admin-sidebar h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-tertiary); margin-bottom: 12px; margin-top: 20px; }
    .admin-sidebar h3:first-child { margin-top: 0; }
    .admin-sidebar a { display: block; padding: 8px 12px; border-radius: var(--radius); font-size: 13px; color: var(--text-secondary); font-weight: 500; margin-bottom: 2px; }
    .admin-sidebar a:hover { background: var(--surface-hover); color: var(--text); }
    .admin-main { flex: 1; padding: 32px; max-width: 960px; }
    .admin-main h1 { font-size: 28px; margin-bottom: 4px; }
    .admin-main .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 32px; }
    .stat-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
    .stat-card { border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; background: var(--surface); }
    .stat-card .num { font-size: 28px; font-weight: 700; }
    .stat-card .label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .admin-table th { text-align: left; padding: 10px 12px; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    .admin-table td { padding: 12px; border-bottom: 1px solid var(--border-light); }
    .admin-table tr:hover td { background: var(--surface-hover); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .badge-admin { background: #FEF3C7; color: #92400E; }
    .badge-client { background: #DBEAFE; color: #1E40AF; }
    .badge-reviewer { background: #E0E7FF; color: #3730A3; }
    [data-theme="dark"] .badge-admin { background: rgba(251,191,36,0.15); color: #FCD34D; }
    [data-theme="dark"] .badge-client { background: rgba(59,130,246,0.15); color: #93C5FD; }
    [data-theme="dark"] .badge-reviewer { background: rgba(99,102,241,0.15); color: #A5B4FC; }
    .loading-state { display: flex; align-items: center; justify-content: center; min-height: 400px; color: var(--text-secondary); }
    .auth-page { min-height: calc(100vh - var(--nav-height)); display: flex; align-items: center; justify-content: center; padding: 48px; }
    .auth-card { text-align: center; }
    .auth-card h2 { margin-bottom: 12px; }
    .auth-card p { color: var(--text-secondary); margin-bottom: 20px; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .admin-user { font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; }
  </style>
</head>
<body>
<div class="site-loader" data-loader><div class="loader-ring"></div></div>

<header class="topbar">
  <nav class="nav">
    <a class="brand" href="/">Vian</a>
    <div class="nav-links" data-nav-links>
      <a href="/">Home</a>
      <a href="/about">About</a>
      <a href="/services">Services</a>
      <a href="/pricing">Pricing</a>
      <a href="/contact">Contact</a>
    </div>
    <div class="nav-actions">
      <button class="icon-btn" data-theme-toggle type="button" aria-label="Toggle theme">&#x25D0;</button>
      <a class="btn btn-secondary" href="/login">Sign In</a>
      <a class="btn btn-primary" href="/register">Get Started</a>
      <button class="icon-btn menu-toggle" data-menu-toggle type="button" aria-label="Menu">&#x2630;</button>
    </div>
  </nav>
</header>

<main id="app">
  <div class="loading-state">Checking authorization...</div>
</main>

<footer class="footer">
  <div class="container footer-bottom">
    <span>&copy; 2026 Vian Software Solutions. All rights reserved.</span>
  </div>
</footer>

<div class="toast" data-toast></div>

<script>
(async function() {
  const app = document.getElementById('app')

  try {
    const res = await fetch('/api/auth/me')
    if (!res.ok) throw new Error('not authenticated')
    const data = await res.json()
    if (data.user.role !== 'admin' && data.user.role !== 'reviewer') throw new Error('not authorized')

    app.innerHTML = `
      <div class="admin-layout">
        <aside class="admin-sidebar">
          <h3>Admin</h3>
          <a href="/admin" style="background:var(--surface-hover);color:var(--text)">Dashboard</a>
          <a href="#" onclick="alert('Coming soon')">Quotations</a>
          <a href="#" onclick="alert('Coming soon')">Users</a>
          <a href="#" onclick="alert('Coming soon')">Projects</a>
          <a href="#" onclick="alert('Coming soon')">Payments</a>
          <h3>Account</h3>
          <a href="#" onclick="logout()">Sign Out</a>
        </aside>
        <div class="admin-main">
          <div class="admin-header">
            <div>
              <h1>Admin Dashboard</h1>
              <p class="subtitle">Welcome back, ${data.user.name}</p>
            </div>
            <div class="admin-user">
              <span class="badge badge-${data.user.role}">${data.user.role}</span>
              <span>${data.user.email}</span>
            </div>
          </div>
          <div class="stat-cards">
            <div class="stat-card"><div class="num" id="statQuotations">0</div><div class="label">Quotations</div></div>
            <div class="stat-card"><div class="num" id="statUsers">0</div><div class="label">Users</div></div>
            <div class="stat-card"><div class="num" id="statProjects">0</div><div class="label">Projects</div></div>
            <div class="stat-card"><div class="num" id="statRevenue">₹0</div><div class="label">Revenue</div></div>
          </div>
          <h3 style="margin-bottom:16px">Recent Users</h3>
          <table class="admin-table">
            <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th></tr></thead>
            <tbody id="usersTable"><tr><td colspan="4" style="text-align:center;color:var(--text-tertiary)">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    `

    const statsRes = await fetch('/api/admin/stats')
    if (statsRes.ok) {
      const stats = await statsRes.json()
      document.getElementById('statQuotations').textContent = stats.quotations ?? 0
      document.getElementById('statUsers').textContent = stats.users ?? 0
      document.getElementById('statProjects').textContent = stats.projects ?? 0
      document.getElementById('statRevenue').textContent = '₹' + (stats.revenue ?? 0)
    }

    const usersRes = await fetch('/api/admin/users')
    if (usersRes.ok) {
      const users = await usersRes.json()
      const tbody = document.getElementById('usersTable')
      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-tertiary)">No users yet</td></tr>'
      } else {
        tbody.innerHTML = users.map(u => `
          <tr>
            <td><strong>${u.name}</strong></td>
            <td>${u.email}</td>
            <td><span class="badge badge-${u.role}">${u.role}</span></td>
            <td class="muted">${new Date(u.createdAt).toLocaleDateString()}</td>
          </tr>
        `).join('')
      }
    }

  } catch {
    app.innerHTML = `
      <div class="auth-page">
        <div class="auth-card">
          <h2>Access Denied</h2>
          <p>You need admin privileges to access this area.</p>
          <a class="btn btn-primary" href="/login">Sign In</a>
        </div>
      </div>
    `
  }
})()

async function logout() {
  await fetch('/api/auth/logout', { method: 'POST' })
  window.location.href = '/login'
}
</script>
</body>
</html>
