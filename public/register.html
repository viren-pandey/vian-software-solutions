<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Account | Vian Software Solutions</title>
  <meta name="description" content="Create your Vian Software Solutions account to request quotations and manage projects.">
  <link rel="canonical" href="https://www.viannn.online/register">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script defer src="js/theme.js"></script>
  <script defer src="js/app.js"></script>
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 80px 24px; }
    .auth-card { width: 100%; max-width: 400px; }
    .auth-card-inner { border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 40px 32px; background: var(--surface); }
    .auth-card h1 { font-size: 22px; text-align: center; margin-bottom: 4px; font-weight: 600; }
    .auth-card .subtitle { text-align: center; color: var(--text-secondary); font-size: 14px; margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .form-group input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 14px; transition: border-color .15s; }
    .form-group input:focus { outline: none; border-color: var(--text-secondary); }
    .auth-btn { width: 100%; padding: 10px; font-size: 14px; margin-top: 8px; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-secondary); }
    .auth-footer a { font-weight: 600; color: var(--text); }
    .auth-footer a:hover { text-decoration: underline; }
    .alert { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 20px; display: none; }
    .alert-error { background: var(--accent-light); color: var(--error); border: 1px solid var(--border); display: block; }
    .password-toggle { position: relative; }
    .password-toggle .toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-tertiary); font-size: 12px; padding: 4px; }
    .password-toggle .toggle:hover { color: var(--text-secondary); }
    .terms-note { text-align: center; font-size: 12px; color: var(--text-tertiary); margin-top: 16px; line-height: 1.5; }
    .terms-note a { color: var(--text); font-weight: 500; }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo .brand { display: inline-flex; }
  </style>
</head>
<body>

<main class="auth-page">
  <div class="auth-card">
    <div class="auth-card-inner">
      <div class="auth-logo">
        <a class="brand" href="/">
          <svg class="logo" viewBox="0 0 32 32" fill="none" aria-hidden="true" style="width:28px;height:28px">
            <rect width="32" height="32" rx="8" fill="var(--text)"/>
            <path d="M8 16L14 22L24 10" stroke="var(--bg)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="brand-text">Vian</span>
        </a>
      </div>
      <h1>Create your account</h1>
      <p class="subtitle">Join Vian to request quotations and manage your projects</p>
      <div id="alert" class="alert"></div>
      <form id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Your full name" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-toggle">
            <input type="password" id="password" name="password" placeholder="Create a password" required autocomplete="new-password">
            <button type="button" class="toggle" onclick="togglePassword()">Show</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary auth-btn" id="submitBtn">Create Account</button>
      </form>
      <div class="terms-note">By creating an account, you agree to our <a href="/legal/terms-and-conditions">Terms of Service</a> and <a href="/legal/privacy-policy">Privacy Policy</a>.</div>
      <div class="auth-footer">Already have an account? <a href="/login">Sign in</a></div>
    </div>
  </div>
</main>

<script>
function togglePassword() {
  const pwd = document.getElementById('password')
  const btn = event.target
  if (pwd.type === 'password') { pwd.type = 'text'; btn.textContent = 'Hide' }
  else { pwd.type = 'password'; btn.textContent = 'Show' }
}

document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault()
  const btn = document.getElementById('submitBtn')
  const alert = document.getElementById('alert')
  btn.disabled = true; btn.textContent = 'Creating account...'
  alert.style.display = 'none'
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })
    })
    const data = await res.json()
    if (!res.ok) {
      alert.className = 'alert alert-error'; alert.textContent = data.error; alert.style.display = 'block'
      btn.disabled = false; btn.textContent = 'Create Account'
      return
    }
    window.location.href = '/dashboard'
  } catch {
    alert.className = 'alert alert-error'; alert.textContent = 'Connection error. Please try again.'; alert.style.display = 'block'
    btn.disabled = false; btn.textContent = 'Create Account'
  }
})
</script>
</body>
</html>
