<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In | Vian Software Solutions</title>
  <meta name="description" content="Sign in to your Vian Software Solutions account.">
  <link rel="canonical" href="https://www.viannn.online/login">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script defer src="js/theme.js"></script>
  <script defer src="js/app.js"></script>
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 80px 24px; }
    .auth-card { width: 100%; max-width: 400px; }
    .auth-card-inner { border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 40px 32px; background: var(--surface); }
    .auth-card h1 { font-size: 22px; text-align: center; margin-bottom: 4px; font-weight: 600; }
    .auth-card .subtitle { text-align: center; color: var(--text-secondary); font-size: 14px; margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .form-group input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 14px; transition: border-color .15s; }
    .form-group input:focus { outline: none; border-color: var(--text-secondary); }
    .auth-btn { width: 100%; padding: 10px; font-size: 14px; margin-top: 8px; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-secondary); }
    .auth-footer a { font-weight: 600; color: var(--text); }
    .auth-footer a:hover { text-decoration: underline; }
    .alert { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 20px; display: none; }
    .alert-error { background: var(--accent-light); color: var(--error); border: 1px solid var(--border); display: block; }
    .alert-success { background: var(--accent-light); color: var(--success); border: 1px solid var(--border); display: block; }
    .password-toggle { position: relative; }
    .password-toggle .toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-tertiary); font-size: 12px; padding: 4px; }
    .password-toggle .toggle:hover { color: var(--text-secondary); }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo .brand { display: inline-flex; }
  </style>
</head>
<body>

<main class="auth-page">
  <div class="auth-card">
    <div class="auth-card-inner">
      <div class="auth-logo">
        <a class="brand" href="/">
          <svg class="logo" viewBox="0 0 32 32" fill="none" aria-hidden="true" style="width:28px;height:28px">
            <rect width="32" height="32" rx="8" fill="var(--text)"/>
            <path d="M8 16L14 22L24 10" stroke="var(--bg)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="brand-text">Vian</span>
        </a>
      </div>
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your account</p>
      <div id="alert" class="alert"></div>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-toggle">
            <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
            <button type="button" class="toggle" onclick="togglePassword()">Show</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary auth-btn" id="submitBtn">Sign In</button>
      </form>
      <div class="auth-footer">
        Don't have an account? <a href="/register">Create one</a>
      </div>
    </div>
  </div>
</main>

<script>
function togglePassword() {
  const pwd = document.getElementById('password')
  const btn = event.target
  if (pwd.type === 'password') { pwd.type = 'text'; btn.textContent = 'Hide' }
  else { pwd.type = 'password'; btn.textContent = 'Show' }
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault()
  const btn = document.getElementById('submitBtn')
  const alert = document.getElementById('alert')
  btn.disabled = true; btn.textContent = 'Signing in...'
  alert.style.display = 'none'
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
    })
    const data = await res.json()
    if (!res.ok) {
      alert.className = 'alert alert-error'; alert.textContent = data.error; alert.style.display = 'block'
      btn.disabled = false; btn.textContent = 'Sign In'
      return
    }
    const redirect = new URLSearchParams(window.location.search).get('redirect') || (data.user.role === 'admin' ? '/admin' : '/dashboard')
    window.location.href = redirect
  } catch {
    alert.className = 'alert alert-error'; alert.textContent = 'Connection error. Please try again.'; alert.style.display = 'block'
    btn.disabled = false; btn.textContent = 'Sign In'
  }
})
</script>
</body>
</html>
