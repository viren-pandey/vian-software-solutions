<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Panel | Vian Software Solutions</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script defer src="js/theme.js"></script>
  <script defer src="js/app.js"></script>
  <style>
    .admin-layout { display: flex; min-height: calc(100vh - var(--nav-height)); }
    .admin-sidebar { width: 240px; border-right: 1px solid var(--border); padding: 24px; flex-shrink: 0; }
    .admin-sidebar h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-tertiary); margin-bottom: 12px; margin-top: 20px; }
    .admin-sidebar h3:first-child { margin-top: 0; }
    .admin-sidebar a { display: block; padding: 8px 12px; border-radius: var(--radius); font-size: 13px; color: var(--text-secondary); font-weight: 500; margin-bottom: 2px; cursor: pointer; }
    .admin-sidebar a:hover, .admin-sidebar a.active { background: var(--surface-hover); color: var(--text); }
    .admin-main { flex: 1; padding: 32px; max-width: 960px; }
    .admin-main h1 { font-size: 28px; margin-bottom: 4px; }
    .admin-main .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
    .stat-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; background: var(--surface); }
    .stat-card .num { font-size: 28px; font-weight: 700; }
    .stat-card .label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .admin-table th { text-align: left; padding: 10px 12px; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    .admin-table td { padding: 12px; border-bottom: 1px solid var(--border-light); }
    .admin-table tr:hover td { background: var(--surface-hover); }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .admin-user { font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; }
    .loading-state { display: flex; align-items: center; justify-content: center; min-height: 400px; color: var(--text-secondary); }
    .auth-page { min-height: calc(100vh - var(--nav-height)); display: flex; align-items: center; justify-content: center; padding: 48px; }
    .auth-card { text-align: center; }
    .auth-card h2 { margin-bottom: 12px; }
    .auth-card p { color: var(--text-secondary); margin-bottom: 20px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .badge-admin { background: #FEF3C7; color: #92400E; }
    .badge-client { background: #DBEAFE; color: #1E40AF; }
    .badge-reviewer { background: #E0E7FF; color: #3730A3; }
    .badge-SUBMITTED { background: #DBEAFE; color: #1E40AF; }
    .badge-UNDER_REVIEW { background: #FEF3C7; color: #92400E; }
    .badge-QUOTED { background: #E0E7FF; color: #3730A3; }
    .badge-ACCEPTED { background: #D1FAE5; color: #065F46; }
    .badge-INVOICED { background: #FCE7F3; color: #9D174D; }
    .badge-PAID { background: #A7F3D0; color: #065F46; }
    .badge-REJECTED { background: #FEE2E2; color: #991B1B; }
    .badge-CANCELLED { background: #F3F4F6; color: #4B5563; }
    .badge-REVISION_REQUESTED { background: #FDE68A; color: #92400E; }
    .badge-active { background: #D1FAE5; color: #065F46; }
    .badge-paused { background: #FEF3C7; color: #92400E; }
    .badge-completed { background: #DBEAFE; color: #1E40AF; }
    .badge-cancelled { background: #FEE2E2; color: #991B1B; }
    .badge-pending { background: #FEF3C7; color: #92400E; }
    .badge-success { background: #D1FAE5; color: #065F46; }
    .badge-failed { background: #FEE2E2; color: #991B1B; }
    .badge-refunded { background: #E0E7FF; color: #3730A3; }
    [data-theme="dark"] .badge-admin { background: rgba(251,191,36,0.15); color: #FCD34D; }
    [data-theme="dark"] .badge-client { background: rgba(59,130,246,0.15); color: #93C5FD; }
    [data-theme="dark"] .badge-SUBMITTED { background: rgba(59,130,246,0.15); color: #93C5FD; }
    [data-theme="dark"] .badge-UNDER_REVIEW { background: rgba(251,191,36,0.15); color: #FCD34D; }
    [data-theme="dark"] .badge-QUOTED { background: rgba(99,102,241,0.15); color: #A5B4FC; }
    [data-theme="dark"] .badge-ACCEPTED { background: rgba(52,211,153,0.15); color: #6EE7B7; }
    [data-theme="dark"] .badge-PAID { background: rgba(52,211,153,0.15); color: #6EE7B7; }
    [data-theme="dark"] .badge-pending { background: rgba(245,158,11,0.15); color: #FCD34D; }
    .chat-layout { display:flex;height:calc(100vh - var(--nav-height) - 80px);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--surface);max-height:700px }
    .chat-list { width:320px;border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;background:var(--bg-secondary) }
    .chat-list-item { display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--border-light);transition:background .1s }
    .chat-list-item:hover,.chat-list-item.active { background:var(--surface-hover) }
    .chat-avatar { width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0;background:var(--accent-light);color:var(--accent) }
    .chat-info { flex:1;min-width:0 }
    .chat-info .name { font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis }
    .chat-info .preview { font-size:12px;color:var(--text-tertiary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px }
    .chat-info .badge { margin-top:2px }
    .chat-meta { text-align:right;flex-shrink:0;font-size:11px;color:var(--text-tertiary) }
    .chat-unread { display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;margin-top:4px }
    .chat-area { flex:1;display:flex;flex-direction:column;background:var(--surface) }
    .chat-empty { flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-tertiary);font-size:14px }
    .chat-header { padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface) }
    .chat-msgs { flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px }
    .chat-bubble { max-width:75%;padding:10px 14px;border-radius:var(--radius-lg);font-size:13px;line-height:1.5;position:relative }
    .chat-bubble.admin { align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px }
    .chat-bubble.client { align-self:flex-start;background:var(--surface-hover);color:var(--text);border-bottom-left-radius:4px }
    .chat-bubble .time { font-size:10px;opacity:0.6;margin-top:4px;text-align:right }
    .chat-input { padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--surface) }
    .chat-input input { flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--bg-secondary);color:var(--text);font-size:13px;outline:none }
    .chat-input input:focus { border-color:var(--accent) }
    .dash-form { max-width: 500px; }
    .dash-form .form-group { margin-bottom: 14px; }
    .dash-form label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
    .dash-form input, .dash-form textarea, .dash-form select { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); font-size: 14px; }
  </style>
</head>
<body>
<div class="site-loader" data-loader><div class="loader-ring"></div></div>

<header class="topbar">
  <nav class="nav">
    <a class="brand" href="/">Vian</a>
    <div class="nav-links" data-nav-links>
      <a href="/">Home</a>
      <a href="/about">About</a>
      <a href="/services">Services</a>
      <a href="/pricing">Pricing</a>
      <a href="/contact">Contact</a>
    </div>
    <div class="nav-actions">
      <button class="icon-btn" data-theme-toggle type="button" aria-label="Toggle theme">&#x25D0;</button>
      <a class="btn btn-secondary" href="/login">Sign In</a>
      <a class="btn btn-primary" href="/register">Get Started</a>
      <button class="icon-btn menu-toggle" data-menu-toggle type="button" aria-label="Menu">&#x2630;</button>
    </div>
  </nav>
</header>

<main id="app">
  <div class="loading-state">Checking authorization...</div>
</main>

<footer class="footer">
  <div class="container footer-bottom">
    <span>&copy; 2026 Vian Software Solutions. All rights reserved.</span>
  </div>
</footer>

<div class="toast" data-toast></div>

<script>
let user = null
let currentPage = 'dashboard'
let adminPollTimer = null
let adminLastUnread = 0

async function api(path, opts = {}) {
  const controller = new AbortController()
  const timeout = setTimeout(() => controller.abort(), 10000)
  try {
    const res = await fetch(path, { credentials: 'include', signal: controller.signal, ...opts })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error || 'Request failed')
    return data
  } finally {
    clearTimeout(timeout)
  }
}

function esc(s) {
  const d = document.createElement('div')
  d.textContent = s || ''
  return d.innerHTML
}

function showToast(msg) {
  const t = document.querySelector('[data-toast]')
  if (t) { t.textContent = msg; t.classList.add('show'); clearTimeout(window._t); window._t = setTimeout(() => t.classList.remove('show'), 3200) }
}

const STATUSES = ['SUBMITTED', 'UNDER_REVIEW', 'QUOTED', 'REVISION_REQUESTED', 'ACCEPTED', 'INVOICED', 'PAID', 'REJECTED', 'CANCELLED']

async function loadPage(page) {
  currentPage = page
  document.querySelectorAll('.admin-sidebar a[data-page]').forEach(a => a.classList.toggle('active', a.dataset.page === page))
  const main = document.querySelector('.admin-main')
  if (!main) return
  main.innerHTML = '<div class="loading-state">Loading...</div>'

  try {
    if (page === 'dashboard') await showDashboard(main)
    else if (page === 'quotations') await showQuotations(main)
    else if (page === 'users') await showUsers(main)
    else if (page === 'projects') await showProjects(main)
    else if (page === 'payments') await showPayments(main)
    else if (page === 'chats') await showChats(main)
  } catch (e) {
    main.innerHTML = `<div class="empty-state" style="text-align:center;padding:64px"><h3>Error</h3><p>${esc(e.message)}</p></div>`
  }
}

async function showDashboard(main) {
  const stats = await api('/api/admin/stats')
  main.innerHTML = `
    <div class="admin-header">
      <div>
        <h1>Admin Dashboard</h1>
        <p class="subtitle">Welcome back, ${esc(user.name)}</p>
      </div>
      <div class="admin-user">
        <span class="badge badge-${user.role}">${user.role}</span>
        <span>${user.email}</span>
      </div>
    </div>
    <div class="stat-cards">
      <div class="stat-card"><div class="num">${stats.quotations}</div><div class="label">Quotations</div></div>
      <div class="stat-card"><div class="num">${stats.users}</div><div class="label">Users</div></div>
      <div class="stat-card"><div class="num">${stats.projects}</div><div class="label">Projects</div></div>
      <div class="stat-card"><div class="num">₹${Number(stats.revenue).toLocaleString()}</div><div class="label">Revenue</div></div>
    </div>
  `
  // Fetch recent users and quotations in parallel
  try {
    const [users, quotations] = await Promise.all([
      api('/api/admin/users'),
      api('/api/admin/quotations'),
    ])
    main.innerHTML += `
      <h3 style="margin-bottom:12px">Recent Users</h3>
      <table class="admin-table" style="margin-bottom:32px">
        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th></tr></thead>
        <tbody>${users.length === 0 ? '<tr><td colspan="4" style="text-align:center;color:var(--text-tertiary)">No users yet</td></tr>' :
          users.slice(0, 10).map((u) => `<tr><td><strong>${esc(u.name)}</strong></td><td>${esc(u.email)}</td><td><span class="badge badge-${u.role}">${u.role}</span></td><td>${new Date(u.createdAt).toLocaleDateString()}</td></tr>`).join('')}
        </tbody>
      </table>
      <h3 style="margin-bottom:12px">Recent Quotations</h3>
      <table class="admin-table">
        <thead><tr><th>Client</th><th>Title</th><th>Status</th><th>Date</th></tr></thead>
        <tbody>${quotations.length === 0 ? '<tr><td colspan="4" style="text-align:center;color:var(--text-tertiary)">No quotations yet</td></tr>' :
          quotations.slice(0, 10).map((q) => `<tr><td>${esc(q.user?.name || 'Unknown')}</td><td><strong>${esc(q.title)}</strong></td><td><span class="badge badge-${q.status}">${q.status.replace(/_/g, ' ')}</span></td><td>${new Date(q.createdAt).toLocaleDateString()}</td></tr>`).join('')}
        </tbody>
      </table>
    `
  } catch (e) {
    main.innerHTML += `<p style="color:var(--text-secondary)">Could not load details: ${esc(e.message)}</p>`
  }
}

async function showQuotations(main) {
  const quotations = await api('/api/admin/quotations')
  main.innerHTML = `
    <div class="admin-header">
      <div>
        <h1>Quotations</h1>
        <p class="subtitle">Manage all client quotation requests</p>
      </div>
    </div>
    ${quotations.length === 0 ? `
      <div class="empty-state" style="text-align:center;padding:64px;border:1px dashed var(--border);border-radius:var(--radius-lg)">
        <h3>No quotations yet</h3>
        <p style="color:var(--text-secondary)">Quotations will appear when clients submit requests.</p>
      </div>
    ` : `
      <table class="admin-table">
        <thead><tr><th>Client</th><th>Title</th><th>Amount</th><th>Status</th><th>Date</th><th>Action</th></tr></thead>
        <tbody>${quotations.map((q) => `
          <tr>
            <td>${esc(q.user?.name || 'Unknown')}</td>
            <td><strong><a href="#" onclick="event.preventDefault();showAdminQuotationDetail('${q.id}')" style="color:var(--accent);text-decoration:none">${esc(q.title)}</a></strong><br><span style="font-size:11px;color:var(--text-tertiary)">${q.service ? esc(q.service.name) : ''}</span></td>
            <td>${q.quotedAmount ? '₹' + Number(q.quotedAmount).toLocaleString() : '-'}</td>
            <td><span class="badge badge-${q.status}">${q.status.replace(/_/g, ' ')}</span></td>
            <td>${new Date(q.createdAt).toLocaleDateString()}</td>
            <td><button class="btn btn-secondary" style="padding:4px 12px;font-size:12px" onclick="editQuotation('${q.id}','${q.status}','${q.quotedAmount || ''}','${q.quoteValidityDays || '15'}')">Edit</button></td>
          </tr>
        `).join('')}</tbody>
      </table>
    `}
  `
}

window.showAdminQuotationDetail = async function(id) {
  const main = document.querySelector('.admin-main')
  main.innerHTML = '<div class="loading-state">Loading...</div>'
  try {
    const q = await api('/api/admin/quotations/' + id)
    const msgs = q.messages || []
    const msgHtml = msgs.map(m => `<div style="margin-bottom:12px;padding:10px 14px;background:${m.senderId === user.id ? 'var(--accent)' : 'var(--surface-hover)'};color:${m.senderId === user.id ? '#fff' : 'var(--text)'};border-radius:var(--radius);max-width:80%;margin-left:${m.senderId === user.id ? 'auto' : '0'}"><div style="font-size:11px;opacity:0.7;margin-bottom:4px">${esc(m.sender.name)} &middot; ${new Date(m.createdAt).toLocaleString()}</div>${esc(m.body)}</div>`).join('') || '<p style="color:var(--text-secondary);text-align:center;padding:24px">No messages yet.</p>'
    const atts = q.attachments || []
    const attHtml = atts.length > 0 ? `
      <div style="margin-bottom:16px">
        <h3 style="margin-bottom:8px">Attachments (${atts.length})</h3>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          ${atts.map(a => {
            const isImg = a.mimeType?.startsWith('image/')
            return isImg
              ? `<a href="${esc(a.fileUrl)}" target="_blank" style="display:block;width:100px;height:80px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);background:var(--surface-hover)"><img src="${esc(a.fileUrl)}" alt="${esc(a.fileName)}" style="width:100%;height:100%;object-fit:cover"></a>`
              : `<a href="${esc(a.fileUrl)}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface-hover);font-size:12px;color:var(--text-secondary);text-decoration:none"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>${esc(a.fileName)}</a>`
          }).join('')}
        </div>
      </div>
    ` : ''
    main.innerHTML = `
      <div class="admin-header">
        <div>
          <h1>${esc(q.title)}</h1>
          <p class="subtitle">${q.user ? esc(q.user.name) + ' (' + esc(q.user.email) + ')' : ''} &middot; ${q.service ? esc(q.service.name) : ''} &middot; <span class="badge badge-${q.status}">${q.status.replace(/_/g, ' ')}</span></p>
        </div>
        <button class="btn btn-secondary" onclick="loadPage('quotations')">Back</button>
      </div>
      ${attHtml}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">
        ${q.description ? '<div class="card" style="padding:16px;border:1px solid var(--border);border-radius:var(--radius-lg)"><strong>Description</strong><p style="margin-top:6px;color:var(--text-secondary);font-size:13px">' + esc(q.description) + '</p></div>' : ''}
        ${q.goals ? '<div class="card" style="padding:16px;border:1px solid var(--border);border-radius:var(--radius-lg)"><strong>Goals</strong><p style="margin-top:6px;color:var(--text-secondary);font-size:13px">' + esc(q.goals) + '</p></div>' : ''}
        ${q.budgetRange ? '<div class="card" style="padding:16px;border:1px solid var(--border);border-radius:var(--radius-lg)"><strong>Budget Range</strong><p style="margin-top:6px;color:var(--text-secondary);font-size:13px">' + esc(q.budgetRange) + '</p></div>' : ''}
        ${q.timeline ? '<div class="card" style="padding:16px;border:1px solid var(--border);border-radius:var(--radius-lg)"><strong>Timeline</strong><p style="margin-top:6px;color:var(--text-secondary);font-size:13px">' + esc(q.timeline) + '</p></div>' : ''}
        ${q.preferredTechnologies?.length ? '<div class="card" style="padding:16px;border:1px solid var(--border);border-radius:var(--radius-lg)"><strong>Technologies</strong><p style="margin-top:6px;color:var(--text-secondary);font-size:13px">' + esc(q.preferredTechnologies.join(', ')) + '</p></div>' : ''}
        ${q.quotedAmount ? '<div class="card" style="padding:16px;border:1px solid var(--border);border-radius:var(--radius-lg)"><strong>Quoted Amount</strong><p style="margin-top:6px;color:var(--text-secondary);font-size:13px">₹' + Number(q.quotedAmount).toLocaleString() + '</p></div>' : ''}
      </div>
      <div style="margin-bottom:16px">
        <button class="btn btn-primary" onclick="editQuotation('${q.id}','${q.status}','${q.quotedAmount || ''}','${q.quoteValidityDays || '15'}')">Edit Status</button>
      </div>
      <h3 style="margin-bottom:12px">Discussion</h3>
      <div style="border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px;max-height:400px;overflow-y:auto" id="adminMsgThread">${msgHtml}</div>
      <form id="adminMsgForm" style="display:flex;gap:8px">
        <input type="text" id="adminMsgBody" placeholder="Type your reply..." style="flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text)">
        <button type="submit" class="btn btn-primary">Send</button>
      </form>
    `
    document.getElementById('adminMsgForm').addEventListener('submit', async function(e) {
      e.preventDefault()
      const input = document.getElementById('adminMsgBody')
      const body = input.value.trim()
      if (!body) return
      input.disabled = true
      try {
        await api('/api/admin/quotations/' + id + '/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ body }),
        })
        input.value = ''
        showAdminQuotationDetail(id)
      } catch (e) {
        showToast(e.message)
      }
      input.disabled = false
    })
  } catch (e) {
    main.innerHTML = '<div class="empty-state" style="text-align:center;padding:64px"><h3>Error</h3><p style="color:var(--text-secondary)">' + esc(e.message) + '</p></div>'
  }
}

window.editQuotation = function(id, currentStatus, quotedAmount, validityDays) {
  const main = document.querySelector('.admin-main')
  main.innerHTML = `
    <div class="admin-header">
      <div>
        <h1>Update Quotation</h1>
      </div>
    </div>
    <form class="dash-form" id="editQuoteForm">
      <div class="form-group">
        <label>Status</label>
        <select id="status">
          ${STATUSES.map(s => `<option value="${s}" ${s === currentStatus ? 'selected' : ''}>${s.replace(/_/g, ' ')}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>Quoted Amount (₹)</label>
        <input type="number" id="quotedAmount" step="0.01" value="${quotedAmount}">
      </div>
      <div class="form-group">
        <label>Quote Validity (days)</label>
        <input type="number" id="quoteValidityDays" value="${validityDays}">
      </div>
      <div class="quick-actions">
        <button type="submit" class="btn btn-primary">Update</button>
        <button type="button" class="btn btn-secondary" onclick="loadPage('quotations')">Cancel</button>
      </div>
    </form>
  `
  document.getElementById('editQuoteForm').addEventListener('submit', async (e) => {
    e.preventDefault()
    const btn = e.target.querySelector('button[type="submit"]')
    btn.disabled = true; btn.textContent = 'Updating...'
    try {
      await api(`/api/admin/quotations/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          status: document.getElementById('status').value,
          quotedAmount: parseFloat(document.getElementById('quotedAmount').value) || undefined,
          quoteValidityDays: parseInt(document.getElementById('quoteValidityDays').value) || undefined,
        }),
      })
      showToast('Quotation updated successfully')
      loadPage('quotations')
    } catch (e) {
      showToast(e.message)
      btn.disabled = false; btn.textContent = 'Update'
    }
  })
}

async function showProjects(main) {
  const projects = await api('/api/admin/projects')
  main.innerHTML = `
    <div class="admin-header">
      <div>
        <h1>Projects</h1>
        <p class="subtitle">Manage all client projects</p>
      </div>
    </div>
    ${projects.length === 0 ? `

      body: JSON.stringify({ status }),
    })

async function showPayments(main) {
  const payments = await api('/api/admin/payments')
  main.innerHTML = `
    <div class="admin-header">
      <div>
        <h1>Payments</h1>
        <p class="subtitle">All payment transactions</p>
      </div>
    </div>
    ${payments.length === 0 ? `
      <div class="empty-state" style="text-align:center;padding:64px;border:1px dashed var(--border);border-radius:var(--radius-lg)">
        <h3>No payments yet</h3>
        <p style="color:var(--text-secondary)">Payments will appear when clients complete transactions.</p>
      </div>
    ` : `

        <tbody>${payments.map((p) => `

            <td>${esc(p.user?.name || 'Unknown')}</td>

window.verifyPayment = async function(id, action) {
  try {
    await api('/api/admin/payments/' + id + '/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action }),
    })
    showToast(action === 'approve' ? 'Payment verified successfully' : 'Payment rejected')
    loadPage('payments')
  } catch (e) {
    showToast(e.message)
  }
}

let activeChatId = null

async function showChats(main) {
  const chats = await api('/api/admin/chats')
  main.innerHTML = `
    <div class="admin-header" style="margin-bottom:0"><div><h1>Chats</h1></div></div>
    <div class="chat-layout">
      <div class="chat-list">
        ${chats.length === 0 ? '<div style="padding:32px;text-align:center;color:var(--text-tertiary);font-size:13px">No conversations yet</div>' :
          chats.map(c => {
            const initial = (c.user?.name || '?')[0].toUpperCase()
            const lastMsg = c.lastMessage?.body?.substring(0, 50) || 'No messages yet'
            const time = c.lastMessage ? new Date(c.lastMessage.createdAt).toLocaleString('en-IN', { hour:'2-digit', minute:'2-digit' }) : ''
            return `
              <div class="chat-list-item ${c.quotationId === activeChatId ? 'active' : ''}" onclick="openChat('${c.quotationId}')">
                <div class="chat-avatar">${initial}</div>
                <div class="chat-info">
                  <div class="name">${esc(c.user?.name || 'Unknown')}</div>
                  <div class="preview">${esc(c.title)} &middot; ${esc(lastMsg)}</div>
                  <span class="badge badge-${c.status}">${c.status.replace(/_/g, ' ')}</span>
                </div>
                <div class="chat-meta">${time}</div>
              </div>
            `
          }).join('')
        }
      </div>
      <div class="chat-area">
        ${activeChatId ? '<div class="chat-empty">Loading chat...</div>' : '<div class="chat-empty">Select a conversation to start chatting</div>'}
      </div>
    </div>
  `
  if (activeChatId) loadChatMessages(activeChatId)
}

window.openChat = async function(quotationId) {
  activeChatId = quotationId
  const main = document.querySelector('.admin-main')
  const list = main.querySelector('.chat-list')
  if (list) {
    list.querySelectorAll('.chat-list-item').forEach(el => el.classList.remove('active'))
    const item = list.querySelector(`[onclick*="'${quotationId}'"]`)
    if (item) item.classList.add('active')
  }
  await loadChatMessages(quotationId)
}

async function loadChatMessages(quotationId) {
  const area = document.querySelector('.chat-area')
  if (!area) return
  area.innerHTML = '<div class="chat-empty">Loading...</div>'
  try {
    const q = await api('/api/admin/quotations/' + quotationId)
    const msgs = q.messages || []
    area.innerHTML = `
      <div class="chat-header">
        <div class="chat-avatar">${(q.user?.name || '?')[0].toUpperCase()}</div>
        <div>
          <div style="font-weight:600;font-size:14px">${esc(q.user?.name || 'Unknown')}</div>
          <div style="font-size:12px;color:var(--text-tertiary)">${esc(q.title)} &middot; <span class="badge badge-${q.status}">${q.status.replace(/_/g, ' ')}</span></div>
        </div>
        <div style="margin-left:auto">
          <button class="btn btn-secondary" style="padding:4px 10px;font-size:11px" onclick="showAdminQuotationDetail('${quotationId}')">Full Details</button>
        </div>
      </div>
      <div class="chat-msgs" id="chatMsgBox">
        ${msgs.length === 0 ? '<div style="text-align:center;padding:32px;color:var(--text-tertiary);font-size:13px">No messages yet. Start the conversation!</div>' :
          msgs.map(m => `
            <div class="chat-bubble ${m.senderId === user.id ? 'admin' : 'client'}">
              <div style="font-size:10px;opacity:0.7;margin-bottom:2px">${esc(m.sender?.name || '')}</div>
              <div>${esc(m.body)}</div>
              <div class="time">${new Date(m.createdAt).toLocaleString('en-IN', { hour:'2-digit', minute:'2-digit', day:'2-digit', month:'short' })}</div>
            </div>
          `).join('')
        }
      </div>
      <form class="chat-input" id="chatForm" onsubmit="return sendChatMessage(event,'${quotationId}')">
        <input type="text" id="chatInput" placeholder="Type a message..." autofocus>
        <button type="submit" class="btn btn-primary" style="padding:10px 18px;border-radius:999px">Send</button>
      </form>
    `
    const box = document.getElementById('chatMsgBox')
    if (box) box.scrollTop = box.scrollHeight
    document.getElementById('chatInput')?.focus()
  } catch (e) {
    area.innerHTML = '<div class="chat-empty">Error loading chat: ' + esc(e.message) + '</div>'
  }
}

window.sendChatMessage = async function(e, quotationId) {
  e.preventDefault()
  const input = document.getElementById('chatInput')
  const body = input.value.trim()
  if (!body) return false
  input.disabled = true
  try {
    await api('/api/admin/quotations/' + quotationId + '/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ body }),
    })
    input.value = ''
    await loadChatMessages(quotationId)
  } catch (e) {
    showToast(e.message)
  }
  input.disabled = false
  return false
}

async function fetchAdminNotifications() {
  try {
    const data = await api('/api/notifications')
    const badge = document.getElementById('adminNotifBadge')
    if (badge) {
      if (data.unread > 0) { badge.style.display = 'inline'; badge.textContent = data.unread > 99 ? '99+' : data.unread }
      else { badge.style.display = 'none' }
    }
    if (data.unread > adminLastUnread && adminLastUnread > 0) {
      loadPage(currentPage)
    }
    adminLastUnread = data.unread
    window._adminNotifs = data.notifications
  } catch {}
}

function startAdminPolling() {
  if (adminPollTimer) clearInterval(adminPollTimer)
  adminPollTimer = setInterval(fetchAdminNotifications, 2000)
}

window.showAdminNotifications = function() {
  const main = document.querySelector('.admin-main')
  const notifs = window._adminNotifs || []
  if (notifs.length === 0) {
    main.innerHTML = '<div class="admin-header"><div><h1>Notifications</h1><p class="subtitle">Stay updated</p></div></div><div class="empty-state" style="text-align:center;padding:64px;border:1px dashed var(--border);border-radius:var(--radius-lg)"><h3>No notifications</h3></div>'
  } else {
    main.innerHTML = '<div class="admin-header"><div><h1>Notifications</h1><p class="subtitle">Stay updated</p></div></div><div style="border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">' + notifs.map(n => '<div style="padding:14px 18px;border-bottom:1px solid var(--border-light);background:' + (n.readAt ? 'transparent' : 'var(--surface-hover)') + '"><div style="font-size:13px;font-weight:' + (n.readAt ? '400' : '600') + '">' + esc(n.payload?.message || n.type) + '</div><div style="font-size:11px;color:var(--text-tertiary);margin-top:4px">' + new Date(n.createdAt).toLocaleString() + '</div></div>').join('') + '</div><button class="btn btn-secondary" style="margin-top:16px" onclick="markAdminNotifRead()">Mark all as read</button>'
  }
  if (notifs.length > 0) markAdminNotifRead()
}

async function markAdminNotifRead() {
  try { await api('/api/notifications/read', { method: 'POST' }); fetchAdminNotifications() } catch {}
}

function logout() {
  fetch('/api/auth/logout', { method: 'POST' }).then(() => { window.location.href = '/login' })
}

;(async function() {
  const app = document.getElementById('app')

  try {
    const ctrl = new AbortController()
    const to = setTimeout(() => ctrl.abort(), 10000)
    const res = await fetch('/api/auth/me', { credentials: 'include', signal: ctrl.signal })
    clearTimeout(to)
    if (!res.ok) throw new Error('not authenticated')
    const data = await res.json()
    user = data.user
    if (user.role !== 'admin' && user.role !== 'reviewer') throw new Error('not authorized')

    app.innerHTML = `
      <div class="admin-layout">
        <aside class="admin-sidebar">
          <h3>Admin</h3>
          <a data-page="dashboard" class="active" onclick="loadPage('dashboard')">Dashboard</a>
          <a data-page="quotations" onclick="loadPage('quotations')">Quotations</a>
          <a data-page="users" onclick="loadPage('users')">Users</a>
          <a data-page="projects" onclick="loadPage('projects')">Projects</a>
          <a data-page="payments" onclick="loadPage('payments')">Payments</a>
          <a data-page="chats" onclick="loadPage('chats')">Chats</a>
          <h3>Account</h3>
          <a style="position:relative" onclick="showAdminNotifications()">Notifications <span id="adminNotifBadge" style="display:none;position:absolute;right:12px;top:50%;transform:translateY(-50%);background:var(--accent);color:#fff;font-size:10px;padding:1px 6px;border-radius:999px;font-weight:700"></span></a>
          <a onclick="logout()">Sign Out</a>
        </aside>
        <div class="admin-main">
          <div class="loading-state">Loading...</div>
        </div>
      </div>
    `

    loadPage('dashboard')
    fetchAdminNotifications()
    startAdminPolling()
  } catch {
    app.innerHTML = `
      <div class="auth-page">
        <div class="auth-card">
          <h2>Access Denied</h2>
          <p>You need admin privileges to access this area.</p>
          <a class="btn btn-primary" href="/login">Sign In</a>
        </div>
      </div>
    `
  }
})()
</script>
</body>
</html>
