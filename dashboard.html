<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard | Vian Software Solutions</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script defer src="js/theme.js"></script>
  <style>
    .dash-layout { display: flex; min-height: calc(100vh - var(--nav-height)); }
    .dash-sidebar { width: 220px; border-right: 1px solid var(--border); padding: 24px; flex-shrink: 0; display: none; }
    .dash-sidebar a { display: block; padding: 8px 12px; border-radius: var(--radius); font-size: 13px; color: var(--text-secondary); font-weight: 500; margin-bottom: 2px; }
    .dash-sidebar a:hover, .dash-sidebar a.active { background: var(--surface-hover); color: var(--text); }
    .dash-main { flex: 1; padding: 32px; max-width: 800px; }
    .dash-main h1 { font-size: 28px; margin-bottom: 4px; }
    .dash-main .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 32px; }
    .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .welcome-card { border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; background: var(--surface); margin-bottom: 24px; }
    .welcome-card h2 { font-size: 20px; margin-bottom: 8px; }
    .welcome-card p { color: var(--text-secondary); font-size: 14px; margin-bottom: 20px; }
    .quick-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .empty-state { text-align: center; padding: 64px 24px; border: 1px dashed var(--border); border-radius: var(--radius-lg); }
    .empty-state h3 { font-size: 18px; margin-bottom: 8px; }
    .empty-state p { color: var(--text-secondary); font-size: 14px; margin-bottom: 20px; }
    .loading-state { display: flex; align-items: center; justify-content: center; min-height: 400px; color: var(--text-secondary); }
    .auth-page { min-height: calc(100vh - var(--nav-height)); display: flex; align-items: center; justify-content: center; padding: 48px; }
    .auth-card { text-align: center; }
    .auth-card h2 { margin-bottom: 12px; }
    .auth-card p { color: var(--text-secondary); margin-bottom: 20px; }
    @media (min-width: 768px) { .dash-sidebar { display: block; } }
  </style>
</head>
<body>
<div class="site-loader" data-loader><div class="loader-ring"></div></div>

<header class="topbar">
  <nav class="nav">
    <a class="brand" href="/">Vian</a>
    <div class="nav-links" data-nav-links>
      <a href="/">Home</a>
      <a href="/about">About</a>
      <a href="/services">Services</a>
      <a href="/pricing">Pricing</a>
      <a href="/contact">Contact</a>
    </div>
    <div class="nav-actions">
      <button class="icon-btn" data-theme-toggle type="button" aria-label="Toggle theme">&#x25D0;</button>
      <button class="icon-btn menu-toggle" data-menu-toggle type="button" aria-label="Menu">&#x2630;</button>
    </div>
  </nav>
</header>

<main id="app">
  <div class="loading-state">Loading...</div>
</main>

<footer class="footer">
  <div class="container footer-bottom">
    <span>&copy; 2026 Vian Software Solutions. All rights reserved.</span>
  </div>
</footer>

<div class="toast" data-toast></div>

<script>
(async function() {
  const app = document.getElementById('app')

  try {
    const res = await fetch('/api/auth/me')
    if (!res.ok) throw new Error('not authenticated')
    const data = await res.json()
    const user = data.user

    app.innerHTML = `
      <div class="dash-layout">
        <aside class="dash-sidebar">
          <a href="/dashboard" class="active">Dashboard</a>
          <a href="#" onclick="alert('Coming soon')">Quotations</a>
          <a href="#" onclick="alert('Coming soon')">Projects</a>
          <a href="#" onclick="alert('Coming soon')">Invoices</a>
          <a href="#" onclick="alert('Coming soon')">Payments</a>
          <a href="#" onclick="alert('Coming soon')">Support</a>
          <hr style="border:none;border-top:1px solid var(--border);margin:16px 0">
          <a href="#" onclick="logout()">Sign Out</a>
        </aside>
        <div class="dash-main">
          <div class="dash-header">
            <div>
              <h1>Dashboard</h1>
              <p class="subtitle">Welcome back, ${user.name}</p>
            </div>
          </div>
          <div class="welcome-card">
            <h2>Ready to start a project?</h2>
            <p>Tell us about your requirements and we'll get back to you with a tailored quote within 1-2 business days.</p>
            <div class="quick-actions">
              <a class="btn btn-primary" href="/pricing">Request a Quote</a>
              <a class="btn btn-secondary" href="/contact">Contact Support</a>
            </div>
          </div>
          <div class="empty-state">
            <h3>No quotations yet</h3>
            <p>Request your first quote to get started. All your quotations, projects, and invoices will appear here.</p>
            <a class="btn btn-primary" href="/pricing">Request a Quote</a>
          </div>
        </div>
      </div>
    `
  } catch {
    app.innerHTML = `
      <div class="auth-page">
        <div class="auth-card">
          <h2>Sign in required</h2>
          <p>You need to be logged in to access your dashboard.</p>
          <a class="btn btn-primary" href="/login">Sign In</a>
        </div>
      </div>
    `
  }
})()

async function logout() {
  await fetch('/api/auth/logout', { method: 'POST' })
  window.location.href = '/login'
}
</script>
</body>
</html>
